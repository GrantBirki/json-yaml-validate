name: acceptance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      # Need to checkout for testing the Action in this repo
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6

      # creates invalid files that are excluded by git and should not fail
      - name: invalid file creation
        run: |
          mkdir -p tmp/
          echo "invalid: yaml" > tmp/invalid.yaml
          echo "invalid: json" > tmp/invalid.json

      # creates a valid file that should not fail
      - name: valid file creation
        run: echo "{}" > valid.yaml

      - name: acceptance test
        uses: ./
        id: json-yaml-validate
        with:
          comment: "true"
          exclude_file: .github/config/exclude.txt

      - name: acceptance test - files input option (glob)
        uses: ./
        id: json-yaml-validate-glob-test
        with:
          comment: "true"
          yaml_as_json: "false"
          exclude_file: .github/config/exclude-alt.txt
          files: |
            __tests__/**/test1.yml
            __tests__/**/test*.json

      - name: acceptance test - files input option (flat list)
        uses: ./
        id: json-yaml-validate-flat-list-test
        with:
          files: __tests__/fixtures/json/valid/json1.json __tests__/fixtures/yaml/valid/yaml1.yaml

      - name: acceptance test - custom formats
        uses: ./
        id: json-yaml-validate-custom-formats-test
        with:
          comment: "true"
          json_schema: ./__tests__/fixtures/schemas/schema_with_custom_ajv_regexp_format.json
          ajv_custom_regexp_formats: |
            lowercase_char=^[a-z]*$
            lowercase_alphanumeric=^[a-z0-9]*$
          files: |
            __tests__/fixtures/json/custom_ajv_regexp_format/valid.json

      - name: acceptance test - schema mappings
        uses: ./
        id: json-yaml-validate-schema-mappings-test
        with:
          use_gitignore: "false"
          schema_mappings: |
            - type: json
              schema: ./__tests__/fixtures/schemas/schema1.json
              files:
                - __tests__/fixtures/json/valid/json1.json
            - type: json
              schema: ./__tests__/fixtures/schemas/schema2.json
              files:
                - __tests__/fixtures/json/mixture/json2.json

      - name: acceptance test - inline schemas
        uses: ./
        id: json-yaml-validate-inline-schemas-test
        with:
          use_gitignore: "false"
          use_inline_schema: "true"
          yaml_as_json: "true"
          files: |
            __tests__/acceptance/inline_schema/json/person.json
            __tests__/acceptance/inline_schema/yaml/person.yaml

      - name: acceptance test - flat yaml
        uses: ./
        id: json-yaml-validate-flat-yaml-test
        with:
          comment: "true"
          yaml_schema: ./__tests__/fixtures/schemas/flat.yaml
          files: |
            __tests__/acceptance/flat_yaml/flat.yaml

      - name: acceptance test - multi yaml as json
        uses: ./
        id: json-yaml-validate-multi-yaml-as-json-test
        with:
          comment: "true"
          allow_multiple_documents: true
          yaml_as_json: true
          json_schema: ./__tests__/fixtures/schemas/schema1.json
          files: |
            __tests__/fixtures/yaml_as_json/valid_multi/yaml1.yaml

      - name: acceptance test - excluding helm charts
        uses: ./
        id: json-yaml-validate-exclude-helm-charts-test
        with:
          comment: "true"
          json_exclude_regex: "edge_cases"
          yaml_exclude_regex: "(charts/external-dns/templates.*|mkdocs.yml|edge_cases)"
          allow_multiple_documents: "true"
          base_dir: __tests__/acceptance

      - name: acceptance test - custom extensions outside base_dir
        uses: ./
        id: custom_extensions
        with:
          base_dir: __tests__/acceptance/prod
          use_gitignore: "false"
          json_extension: .jsonc
          yaml_extension: .yamlx
          yaml_extension_short: .ymlx
          files: |
            __tests__/acceptance/edge_cases/custom/config.jsonc
            __tests__/acceptance/edge_cases/custom/values.yamlx
            __tests__/acceptance/edge_cases/custom/extra.ymlx

      - name: acceptance test - exclude file negation
        uses: ./
        id: exclude_file_negation
        with:
          use_gitignore: "false"
          exclude_file: __tests__/acceptance/edge_cases/exclude/ignore-rules.txt
          files: |
            __tests__/acceptance/edge_cases/exclude/skip.json
            __tests__/acceptance/edge_cases/exclude/important.json
            __tests__/acceptance/edge_cases/exclude/nested/bad.yaml

      - name: acceptance test - warn mode with invalid files
        uses: ./
        id: warn_mode_invalid
        with:
          mode: warn
          use_gitignore: "false"
          files: |
            __tests__/acceptance/edge_cases/failures/invalid.json
            __tests__/acceptance/edge_cases/failures/invalid.yaml

      - name: assert warn mode reports failed validation
        if: ${{ steps.warn_mode_invalid.outputs.success != 'false' }}
        run: |
          echo "warn mode should report success=false for invalid files"
          exit 1

      - name: acceptance test - invalid syntax fails
        uses: ./
        id: invalid_syntax
        continue-on-error: true
        with:
          use_gitignore: "false"
          files: |
            __tests__/acceptance/edge_cases/failures/invalid.json
            __tests__/acceptance/edge_cases/failures/invalid.yaml

      - name: assert invalid syntax fails
        if: ${{ steps.invalid_syntax.outcome != 'failure' }}
        run: |
          echo "invalid syntax should fail in fail mode"
          exit 1

      - name: acceptance test - json schema violation fails
        uses: ./
        id: json_schema_violation
        continue-on-error: true
        with:
          use_gitignore: "false"
          json_schema: ./__tests__/fixtures/schemas/schema1.json
          files: |
            __tests__/fixtures/json/mixture/json1.json

      - name: assert json schema violation fails
        if: ${{ steps.json_schema_violation.outcome != 'failure' }}
        run: |
          echo "json schema violations should fail in fail mode"
          exit 1

      - name: acceptance test - yaml schema violation fails
        uses: ./
        id: yaml_schema_violation
        continue-on-error: true
        with:
          use_gitignore: "false"
          yaml_schema: ./__tests__/fixtures/schemas/schema1.yaml
          files: |
            __tests__/fixtures/yaml/mixture/yaml2.yml

      - name: assert yaml schema violation fails
        if: ${{ steps.yaml_schema_violation.outcome != 'failure' }}
        run: |
          echo "yaml schema violations should fail in fail mode"
          exit 1

      - name: acceptance test - multi document yaml requires opt in
        uses: ./
        id: multi_document_without_opt_in
        continue-on-error: true
        with:
          use_gitignore: "false"
          files: |
            __tests__/fixtures/yaml/multiple/yaml1.yaml

      - name: assert multi document yaml requires opt in
        if: ${{ steps.multi_document_without_opt_in.outcome != 'failure' }}
        run: |
          echo "multi-document YAML should fail when allow_multiple_documents is false"
          exit 1
