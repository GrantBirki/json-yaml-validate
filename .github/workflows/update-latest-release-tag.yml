name: Update Latest Release Tag
run-name: Update ${{ github.event.inputs.major_version_tag }} with ${{ github.event.inputs.source_tag }}

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'The release tag to use as the source (example: v8.0.0)'
        required: true
        default: vX.X.X
      major_version_tag:
        description: 'The major release tag to update with the source (example: v8)'
        required: true
        default: vX

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    env:
      MAJOR_VERSION_TAG: ${{ github.event.inputs.major_version_tag }}
      SOURCE_TAG: ${{ github.event.inputs.source_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6
        with:
          fetch-depth: 0

      - name: validate tag inputs
        run: |
          set -euo pipefail

          semver_tag_regex='^v[0-9]+\.[0-9]+\.[0-9]+$'
          major_tag_regex='^v[0-9]+$'

          if [[ ! "${SOURCE_TAG}" =~ $semver_tag_regex ]]; then
            echo "source_tag must be a release tag like v8.0.0"
            exit 1
          fi

          if [[ ! "${MAJOR_VERSION_TAG}" =~ $major_tag_regex ]]; then
            echo "major_version_tag must be a major tag like v8"
            exit 1
          fi

          source_major="${SOURCE_TAG%%.*}"
          if [[ "${source_major}" != "${MAJOR_VERSION_TAG}" ]]; then
            echo "major_version_tag must match the source_tag major version"
            exit 1
          fi

          if ! git show-ref --verify --quiet "refs/tags/${SOURCE_TAG}"; then
            echo "source_tag does not exist: ${SOURCE_TAG}"
            exit 1
          fi

      - name: git config
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: tag new target
        run: git tag -f "${MAJOR_VERSION_TAG}" "refs/tags/${SOURCE_TAG}^{}"

      - name: push new tag
        run: git push --force origin "refs/tags/${MAJOR_VERSION_TAG}:refs/tags/${MAJOR_VERSION_TAG}"
